service: remotion-campaign-app

provider:
  name: aws
  runtime: nodejs20.x
  region: ${env:REMOTION_AWS_REGION}
  memorySize: 2048 # Vídeo exige memória
  timeout: 60 # Timeout estendido para renderização
  environment:
    NODE_ENV: production

functions:
  api:
    handler: dist/lambda.handler # Gerado pelo build no package.json
    events:
      - httpApi: '*'

